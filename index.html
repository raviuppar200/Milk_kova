<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Karnataka Kova Heritage</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <div class="logo">
      Kova Heritage
    </div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Our Story</a>
      <a href="#">Contact</a>
    </nav>

    <div class="cart">

      <span class="cart-icon">🛒</span>

      <div class="badge" id="cart-count">
        0
      </div>

    </div>

  </header>

  <main class="container">

    <section class="product-section">

      <!-- LEFT -->

      <div class="left-section">

        <div class="main-image">

          <img
            id="mainProductImage"
            src="images/milkburfie.jpg"
            alt="Milk Burfi">

        </div>

        <div class="thumbnails">

          <img
            class="thumb active"
            src="images/milkburfie.jpg"
            alt="Milk Burfi">

          <img
            class="thumb"
            src="images/jamun.jpg"
            alt="Gulab Jamun">

          <img
            class="thumb"
            src="images/milk-kova.png"
            alt="Milk Kova">

        </div>

      </div>

      <!-- RIGHT -->

      <div class="right-section">

        <h1 class="product-title" id="productTitle">
          Premium Milk Burfi
        </h1>

        <div class="price">

          <span class="current-price" id="currentPrice">
            ₹450
          </span>

          <span class="old-price" id="oldPrice">
            ₹500
          </span>

        </div>

        <p class="desc">

          Experience authentic Karnataka traditional sweets crafted
          using premium ingredients, pure milk, fresh ghee and
          heritage recipes passed through generations.

        </p>

        <div class="weight-options">

          <button type="button" class="weight-btn active">
            250g
          </button>

          <button type="button" class="weight-btn">
            500g
          </button>

          <button type="button" class="weight-btn">
            1kg
          </button>

        </div>

        <div class="quantity-box">

          <button type="button" id="minus">
            -
          </button>

          <span id="quantity">
            1
          </span>

          <button type="button" id="plus">
            +
          </button>

        </div>

        <div class="buttons">

          <button type="button" class="add-cart">
            Add to Cart
          </button>

          <button type="button" class="buy-now">
            Buy Now
          </button>

        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
